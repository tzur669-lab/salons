<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>רוני ניילס</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
      background: #FCF1F3;
      color: #473A3E;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 24px;
      padding-top: calc(32px + env(safe-area-inset-top));
      padding-bottom: calc(32px + env(safe-area-inset-bottom));
      text-align: center;
    }
    .icon { font-size: 64px; margin-bottom: 24px; }
    h1 { font-size: 22px; font-weight: 700; margin-bottom: 12px; }
    p  { font-size: 15px; color: #7a6066; line-height: 1.6; margin-bottom: 32px; }
    button {
      background: #473A3E;
      color: white;
      border: none;
      border-radius: 999px;
      padding: 14px 36px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      touch-action: manipulation;
      -webkit-user-select: none;
      user-select: none;
    }
  </style>
</head>
<body>
  <div class="icon">💅</div>
  <h1>אין חיבור לאינטרנט</h1>
  <p>נראה שאין חיבור לאינטרנט כרגע.<br>בדקי את החיבור ונסי שוב.</p>
  <!-- Use explicit href instead of reload() — reload() in some Capacitor WebView
       versions re-loads the local offline.html itself rather than re-attempting
       the remote Vercel URL. The explicit href forces the WebView to navigate
       to the production URL and re-trigger the normal remote URL loading path. -->
  <button onclick="window.location.href='https://roni-nails.vercel.app'">נסי שוב</button>
</body>
</html>
