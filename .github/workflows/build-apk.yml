name: Build APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      note:
        description: 'הערה (אופציונלי)'
        required: false
        default: 'בנייה ידנית'

permissions:
  contents: write

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Capacitor sync (generates capacitor-cordova-android-plugins)
        run: npx cap sync android

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Restore release keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/release.keystore

      - name: Grant execute permission for gradlew
        working-directory: android
        run: chmod +x gradlew

      - name: Build Release APK
        working-directory: android
        run: ./gradlew assembleRelease --stacktrace
        env:
          KEYSTORE_PATH: release.keystore
          KEYSTORE_STORE_PASSWORD: ${{ secrets.KEYSTORE_STORE_PASSWORD }}
          KEYSTORE_KEY_ALIAS: ${{ secrets.KEYSTORE_KEY_ALIAS }}
          KEYSTORE_KEY_PASSWORD: ${{ secrets.KEYSTORE_KEY_PASSWORD }}

      - name: Rename APK to a fixed filename
        run: cp android/app/build/outputs/apk/release/app-release.apk roni-nails.apk

      - name: Upload APK artifact (backup)
        uses: actions/upload-artifact@v4
        with:
          name: roni-nails-${{ github.run_number }}
          path: roni-nails.apk
          retention-days: 30

      - name: Publish GitHub Release (permanent latest-download link)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: Roni Nails APK v1.0.${{ github.run_number }}
          body: ${{ github.event.inputs.note || 'בנייה אוטומטית מתג גרסה' }}
          files: roni-nails.apk
          make_latest: true
